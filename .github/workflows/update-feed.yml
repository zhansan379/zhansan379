name: Update RSS Feed in README

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README with RSS feed
        uses: sarisia/actions-readme-feed@v1
        id: feed
        with:
          url: 'https://blog.csdn.net/m0_73980980/rss/list'
          file: 'README.md'

      # 调试：打印 changed 的值
      - name: Debug changed flag
        run: |
          echo "changed = ${{ steps.feed.outputs.changed }}"
          echo "content = ${{ steps.feed.outputs.content }}"   # 如果支持该输出

      # 强制提交（忽略 changed 条件，直接提交，确保内容被写入）
      - name: Commit and push changes (force)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update RSS feed (force)" || echo "No changes to commit"
          git push
